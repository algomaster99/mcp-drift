name: HuggingFace MCP Lists

on:
  schedule:
    - cron: '0 8 * * *'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

env:
  MCP_URL: https://huggingface.co/mcp

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod
          cache: true

      - name: Build
        run: go build -o mcp-drift .

      - name: Initialize — get mcp-session-id
        run: |
          echo "MCP_SESSION=$(./mcp-drift initialize "$MCP_URL")" >> $GITHUB_ENV

      - name: Fetch MCP lists
        run: |
          mkdir -p live

          fetch_list() {
            local command="$1"
            local output="$2"

            if ./mcp-drift "$command" --session "$MCP_SESSION" "$MCP_URL" > "$output" 2> error.log; then
              if [ "$(tr -d '[:space:]' < "$output")" = "null" ]; then
                printf '[]\n' > "$output"
              fi
              return
            fi

            if grep -qiE 'Method not found|Method not supported' error.log; then
              printf '[]\n' > "$output"
              return
            fi

            cat error.log >&2
            exit 1
          }

          fetch_list tools-list live/tools.json
          fetch_list prompts-list live/prompts.json
          fetch_list resources-list live/resources.json

      - name: Compare to snapshot
        id: diff
        run: |
          drifted=false

          for list in tools prompts resources; do
            if ! diff -q "snapshots/$list/huggingface.json" "live/$list.json" > /dev/null 2>&1; then
              echo "Drift detected in $list/list."
              drifted=true
            fi
          done

          echo "drifted=$drifted" >> $GITHUB_OUTPUT

      - name: Open PR with updated snapshot
        if: steps.diff.outputs.drifted == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BRANCH="drift/huggingface-$(date +%Y-%m-%d)"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git checkout -b "$BRANCH"
          cp live/tools.json snapshots/tools/huggingface.json
          cp live/prompts.json snapshots/prompts/huggingface.json
          cp live/resources.json snapshots/resources/huggingface.json
          git add snapshots/tools/huggingface.json snapshots/prompts/huggingface.json snapshots/resources/huggingface.json
          git commit -m "drift: huggingface MCP lists changed $(date +%Y-%m-%d)"
          git push origin "$BRANCH"
          gh pr create \
            --title "drift: huggingface MCP lists changed ($(date +%Y-%m-%d))" \
            --body "One or more MCP lists at $MCP_URL changed. Review the snapshot diff in the files changed tab." \
            --base main \
            --head "$BRANCH"

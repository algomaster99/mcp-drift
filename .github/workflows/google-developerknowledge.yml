name: Google Developer Knowledge MCP (Tools List)

on:
  schedule:
    - cron: '0 4 * * *'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

env:
  MCP_URL: https://developerknowledge.googleapis.com/mcp

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod
          cache: true

      - name: Build
        run: go build -o mcp-drift .

      - name: Fetch tools/list (stateless — no session required)
        run: |
          ./mcp-drift tools-list "$MCP_URL" > live.json

      - name: Compare to snapshot
        id: diff
        run: |
          if diff -q snapshots/tools/google-developerknowledge.json live.json > /dev/null 2>&1; then
            echo "No drift detected."
            echo "drifted=false" >> $GITHUB_OUTPUT
          else
            echo "Drift detected!"
            echo "drifted=true" >> $GITHUB_OUTPUT
          fi

      - name: Open PR with updated snapshot
        if: steps.diff.outputs.drifted == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BRANCH="drift/google-developerknowledge-$(date +%Y-%m-%d)"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git checkout -b "$BRANCH"
          cp live.json snapshots/tools/google-developerknowledge.json
          git add snapshots/tools/google-developerknowledge.json
          git commit -m "drift: google-developerknowledge tools/list changed $(date +%Y-%m-%d)"
          git push origin "$BRANCH"
          gh pr create \
            --title "drift: google-developerknowledge tools/list changed ($(date +%Y-%m-%d))" \
            --body "The tool list at $MCP_URL has changed. Review the snapshot diff in the files changed tab." \
            --base main \
            --head "$BRANCH"

name: Intercom MCP Lists

on:
  schedule:
    - cron: '0  14 * * *'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

env:
  MCP_URL: https://mcp.intercom.com/mcp

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod
          cache: true

      - name: Build
        run: go build -o mcp-drift .

      - name: Initialize — read capabilities and session
        run: |
          if CAPS=$(./mcp-drift initialize "$MCP_URL" 2>/dev/null); then
            echo "MCP_SESSION=$(echo "$CAPS"   | python3 -c "import json,sys; print(json.load(sys.stdin)['session'])")"   >> $GITHUB_ENV
            echo "HAS_TOOLS=$(echo "$CAPS"     | python3 -c "import json,sys; print('true' if json.load(sys.stdin)['tools'] else 'false')")"     >> $GITHUB_ENV
            echo "HAS_PROMPTS=$(echo "$CAPS"   | python3 -c "import json,sys; print('true' if json.load(sys.stdin)['prompts'] else 'false')")"   >> $GITHUB_ENV
            echo "HAS_RESOURCES=$(echo "$CAPS" | python3 -c "import json,sys; print('true' if json.load(sys.stdin)['resources'] else 'false')")" >> $GITHUB_ENV
          else
            echo "MCP_SESSION="          >> $GITHUB_ENV
            echo "HAS_TOOLS=unknown"     >> $GITHUB_ENV
            echo "HAS_PROMPTS=unknown"   >> $GITHUB_ENV
            echo "HAS_RESOURCES=unknown" >> $GITHUB_ENV
          fi

      - name: Fetch MCP lists
        run: |
          mkdir -p live

          fetch_or_mark() {
            local flag="$1" command="$2" output="$3"

            if [ "$flag" = "false" ]; then
              printf 'false' > "$output"; return
            fi

            local args=()
            [ -n "$MCP_SESSION" ] && args+=(--session "$MCP_SESSION")

            if ./mcp-drift "$command" "${args[@]}" "$MCP_URL" > "$output" 2>error.log; then
              [ "$(tr -d '[:space:]' < "$output")" = "null" ] && printf '[]\n' > "$output"
              return
            fi
            if grep -qiE 'Method not found|Method not supported|404' error.log; then
              printf '[]\n' > "$output"; return
            fi

            printf 'null' > "$output"
          }

          fetch_or_mark "$HAS_TOOLS"     tools-list     live/tools.json
          fetch_or_mark "$HAS_PROMPTS"   prompts-list   live/prompts.json
          fetch_or_mark "$HAS_RESOURCES" resources-list live/resources.json

      - name: Compare to snapshot
        id: diff
        run: |
          drifted=false
          for list in tools prompts resources; do
            if ! diff -q "snapshots/$list/intercom.json" "live/$list.json" > /dev/null 2>&1; then
              echo "Drift detected in $list/list."
              drifted=true
            fi
          done
          echo "drifted=$drifted" >> $GITHUB_OUTPUT

      - name: Open PR with updated snapshot
        if: steps.diff.outputs.drifted == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BRANCH="drift/intercom-$(date +%Y-%m-%d)"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git checkout -b "$BRANCH"
          cp live/tools.json snapshots/tools/intercom.json
          cp live/prompts.json snapshots/prompts/intercom.json
          cp live/resources.json snapshots/resources/intercom.json
          changed_lists=()
          for list in tools prompts resources; do
            if ! git diff --quiet -- "snapshots/$list/intercom.json"; then
              changed_lists+=("$list")
            fi
          done
          python3 .github/scripts/bump_readme_counts.py README.md "[mcp.intercom.com/mcp]" "${changed_lists[@]}"
          git add README.md snapshots/tools/intercom.json snapshots/prompts/intercom.json snapshots/resources/intercom.json
          git commit -m "drift: intercom MCP lists changed $(date +%Y-%m-%d)"
          git push origin "$BRANCH"
          gh pr create \
            --title "drift: intercom MCP lists changed ($(date +%Y-%m-%d))" \
            --body "One or more MCP lists at $MCP_URL changed. Review the snapshot diff in the files changed tab." \
            --base main \
            --head "$BRANCH"
